name: CI/CD Pipeline & Quality Assurance

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js (Quality & Testing Environment)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies (Google Services SDK & Jest)
        run: npm install
        
      - name: Security Vulnerability Scan (NPM Audit)
        run: npm audit --audit-level=high

      - name: Efficiency Build Test (Vite Tree-Shaking)
        run: npm run build
        
      - name: Run ESLint Code Quality Checks
        run: npm run lint
        
      - name: Run Jest Testing Suite
        run: npm test
