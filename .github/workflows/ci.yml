name: CI/CD Pipeline & Quality Assurance

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js (Quality & Testing Environment)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies (Google Services SDK & Jest)
        run: npm install
        
      - name: Run ESLint Code Quality Checks
        run: npm run lint
        
      - name: Run Jest Accessibility & Logic Tests
        run: npm test
