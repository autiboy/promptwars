runtime: nodejs20
env: standard

# Google App Engine specific configuration mapping
handlers:
  - url: /(.*\.(gif|png|jpg|js|css|svg))$
    static_files: \1
    upload: .*\.(gif|png|jpg|js|css|svg)$
    secure: always

  - url: /.*
    static_files: index.html
    upload: index\.html
    secure: always

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 10
