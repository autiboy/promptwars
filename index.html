<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniBridge | Human Intent to System Action</title>
  <meta name="description" content="A Gemini-powered universal bridge translating human intent into seamless interactions with complex societal systems.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="background-elements">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">
    <div class="top-nav">
      <a href="https://github.com/autiboy/promptwars" target="_blank" rel="noopener noreferrer" class="github-link" title="View Source on GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path>
        </svg>
        <span>GitHub</span>
      </a>
    </div>
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>OmniBridge</h1>
      </div>
      <p class="subtitle">AI-powered bridge for navigating complex societal systems</p>
    </header>

    <main>
      <div class="intent-card glassy">
        <label for="userIntent" class="intent-label">What do you want to achieve today?</label>
        <form id="intentForm" class="intent-form">
          <div class="textarea-wrapper">
             <textarea id="userIntent" placeholder="e.g., 'I want to start a small business but don't understand the taxes', or 'My neighborhood has poor street lighting, how do I get it fixed?'" required spellcheck="false"></textarea>
             <button type="button" class="voice-btn" title="Use Voice">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" fill="currentColor"/>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M12 19v4M8 23h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
             </button>
          </div>
          <button type="submit" id="bridgeBtn" class="primary-btn">
            <span class="btn-text">Bridge the Gap</span>
            <div class="stars-icon">✨</div>
          </button>
        </form>
      </div>

      <div id="processingState" class="processing-state hidden">
        <div class="gemini-loader">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <p class="status-text" id="statusText">Analyzing systemic complexity...</p>
      </div>

      <div id="resultsContainer" class="results-container hidden">
        <!-- populated by JS -->
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
